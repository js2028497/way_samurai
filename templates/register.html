{% extends "base.html" %}
{% block title %}Register — Way Samurai{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="glass-card auth-form">
    <h1>Create account</h1>
    <p class="auth-subtitle">Join the Way Samurai community</p>

    {% if error %}
      <div class="form-error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Create a password">
      </div>
      <button type="submit" class="btn-neon" style="width: 100%;">Create Account</button>
    </form>

    <div class="form-footer">
      Already have an account? <a href="{% url 'login' %}">Login</a>
    </div>
  </div>
</div>
{% endblock %}

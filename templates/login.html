{% extends "base.html" %}
{% block title %}Login — Way Samurai{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="glass-card auth-form">
    <h1>Welcome back</h1>
    <p class="auth-subtitle">Login to continue your journey</p>

    {% if error %}
      <div class="form-error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn-neon" style="width: 100%;">Login</button>
    </form>

    <div class="form-footer">
      Don't have an account? <a href="{% url 'register' %}">Sign up</a>
    </div>
  </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Way Samurai Blog{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'pages/css/style.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>

<header class="glass-header" id="glass-header">
  <a href="{% url 'index' %}" class="header-logo">✦ Way Samurai</a>
  <nav class="header-nav">
    <a href="{% url 'index' %}">Articles</a>
    {% if user.is_authenticated %}
      <a href="{% url 'create_article' %}">Write</a>
      <span class="username-badge">{{ user.username }}</span>
      <a href="{% url 'logout' %}" class="btn-ghost">Logout</a>
    {% else %}
      <a href="{% url 'login' %}" class="btn-ghost">Login</a>
      <a href="{% url 'register' %}" class="btn-neon">Sign Up</a>
    {% endif %}
  </nav>
</header>

<main class="main-content">
  {% block content %}{% endblock %}
</main>

<script src="{% static 'pages/js/main.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
